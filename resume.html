<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume — Kaushal Chandola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #06070f; --bg-2:#0b0e1c; --surface:#10152a; --surface-2:#141a33;
  --line:#232b4a; --text:#edeff7; --muted:#8891ab; --muted-2:#5c6480;
  --accent:#7c9bff; --accent-2:#b9c7ff; --amber:#f2b45c; --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg); color:var(--text);
  font-family:"Poppins",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  min-height:100vh;
}
body.light{
  --bg:#ffffff; --surface:#000000; --surface-2:#0a0a0a; --line:#2a2a2a;
  --text:#12141c; --muted:#4b4e5c; --muted-2:#7b7e8c; --accent:#4a5fd9; --accent-2:#7c9bff;
}
a{ color:inherit; text-decoration:none; }
.mono{ font-family:'Space Grotesk', sans-serif; }
nav{
  position:sticky; top:0; z-index:50; display:flex; justify-content:space-between; align-items:center;
  padding:20px 4vw; backdrop-filter:blur(10px); background:rgba(6,7,15,0.75); border-bottom:1px solid var(--line);
}
body.light nav{ background:rgba(255,255,255,0.85); }
nav .logo{ font-weight:600; font-size:1.15rem; }
nav .logo span{ color:var(--accent); }
nav .back-link{
  font-family:'Space Grotesk',sans-serif; font-size:0.85rem; color:var(--muted);
  border:1px solid var(--line); padding:8px 16px; border-radius:100px; display:inline-flex; align-items:center; gap:6px;
  transition:color .2s, border-color .2s;
}
nav .back-link:hover{ color:var(--text); border-color:var(--accent); }
.theme-switch{
  position:relative; width:48px; height:24px; border-radius:100px; border:1px solid rgba(255,255,255,0.15);
  cursor:pointer; padding:0; background:linear-gradient(90deg,#05060c,#1b1d29,#2a2c38); overflow:hidden; flex-shrink:0;
}
body.light .theme-switch{ background:linear-gradient(90deg,#eef1f7,#f6f8fb); border-color:rgba(0,0,0,0.08); }
.ts-knob{
  position:absolute; top:2px; left:25px; width:19px; height:19px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff,#d5d7e0 75%); box-shadow:0 1px 4px rgba(0,0,0,.45);
  transition:left .3s cubic-bezier(.2,.8,.2,1);
}
body.light .ts-knob{ left:2px; }
main{ max-width:900px; margin:0 auto; padding:60px 4vw 100px; }
.page-head{ text-align:center; margin-bottom:44px; }
.page-head h1{ font-size:clamp(1.9rem,4vw,2.6rem); font-weight:700; margin-bottom:10px; }
.page-head p{ color:var(--muted); font-size:0.95rem; }
.resume-card{
  background:linear-gradient(160deg,var(--surface),var(--surface-2)); border:1px solid var(--line);
  border-radius:var(--radius); padding:28px; text-align:center;
}
#resumePreviewWrap{
  border-radius:12px; overflow:hidden; border:1px solid var(--line); margin-bottom:24px;
  background:#fff; display:flex; justify-content:center;
}
#resumePreviewImg{ width:100%; max-width:640px; display:block; }
.meta-row{
  display:flex; justify-content:center; gap:20px; flex-wrap:wrap; margin-bottom:22px;
  font-family:'Space Grotesk',sans-serif; font-size:0.78rem; color:var(--muted-2);
}
.btn-row{ display:flex; justify-content:center; gap:14px; flex-wrap:wrap; }
.btn{
  font-family:inherit; font-weight:600; font-size:0.92rem; padding:14px 30px; border-radius:100px;
  display:inline-flex; align-items:center; gap:8px; transition:transform .25s, box-shadow .25s;
}
.btn.primary{ background:var(--accent); color:#06070f; }
.btn.primary:hover{ transform:translateY(-3px) scale(1.04); box-shadow:0 14px 30px -10px rgba(124,155,255,0.5); }
.btn.ghost{ border:1px solid var(--line); color:var(--text); }
.btn.ghost:hover{ transform:translateY(-3px) scale(1.04); border-color:var(--accent); }

/* ---- Admin ---- */
#adminLoginBtn{
  position:fixed; bottom:20px; right:20px; z-index:999; background:#10152a; color:#8891ab;
  border:1px solid #232b4a; font-family:'Space Grotesk',monospace; font-size:0.7rem;
  padding:8px 14px; border-radius:100px; cursor:pointer; opacity:0.55; transition:opacity .2s;
}
#adminLoginBtn:hover{ opacity:1; }
#loginOverlay{
  position:fixed; inset:0; z-index:2000; background:rgba(6,7,15,0.88); display:none;
  align-items:center; justify-content:center; backdrop-filter:blur(6px);
}
#loginOverlay.show{ display:flex; }
#loginBox{
  background:#10152a; border:1px solid #232b4a; border-radius:16px; padding:32px; width:320px; color:#edeff7;
}
#loginBox h3{ margin-bottom:16px; font-size:1.1rem; }
#loginBox input{
  width:100%; padding:10px 12px; margin-bottom:12px; border-radius:8px; border:1px solid #232b4a;
  background:#0b0e1c; color:#edeff7; font-size:0.9rem;
}
#loginBox button{
  width:100%; padding:10px; border-radius:8px; border:none; background:#7c9bff; color:#06070f;
  font-weight:600; cursor:pointer; margin-top:4px;
}
#loginBox .close{ background:none; color:#8891ab; margin-top:8px; font-size:0.8rem; }
#loginError{ color:#f2a15c; font-size:0.78rem; min-height:16px; margin-bottom:4px; }
#adminBar{ position:fixed; bottom:20px; right:20px; z-index:1500; display:none; }
#adminBar.show{ display:block; }
#adminBarTrigger{
  background:#f2b45c; color:#06070f; border:none; padding:12px 18px; border-radius:100px;
  display:flex; align-items:center; gap:8px; font-family:'Space Grotesk',sans-serif; font-weight:600;
  font-size:0.78rem; cursor:pointer; box-shadow:0 10px 26px -10px rgba(0,0,0,.55);
}
#adminBarMenu{
  position:absolute; bottom:calc(100% + 12px); right:0; background:#10152a; border:1px solid #232b4a;
  border-radius:14px; padding:10px; min-width:190px; display:flex; flex-direction:column; gap:8px;
  box-shadow:0 20px 45px -18px rgba(0,0,0,.6); opacity:0; visibility:hidden; transform:translateY(8px);
  transition:opacity .18s ease, transform .18s ease, visibility .18s;
}
#adminBar:hover #adminBarMenu, #adminBar.menu-open #adminBarMenu{ opacity:1; visibility:visible; transform:translateY(0); }
#adminBar::after{ content:''; position:absolute; bottom:100%; right:0; left:0; height:12px; }
#adminBarMenu button{
  background:#06070f; color:#f2b45c; border:none; padding:9px 14px; border-radius:8px; cursor:pointer;
  font-family:inherit; font-weight:600; font-size:0.74rem; text-align:left; width:100%; transition:background .15s;
}
#adminBarMenu button:hover{ background:#1a1f33; }
#adminBarMenu button#logoutBtn{ color:#e0555f; }
.last-updated-admin{ font-family:'Space Grotesk',sans-serif; font-size:0.72rem; color:var(--muted-2); margin-top:14px; }
</style>
</head>

</main>

<button id="adminLoginBtn">Admin</button>

</div>

  <div id="adminBarMenu">

    <button id="resetResumeBtn">↺ Reset to default</button>

  </div>

</div>

/* ================= Theme (shared with main site) ================= */
(function(){
  const themeSwitch = document.getElementById('themeSwitch');
  const body = document.body;
  function setMode(mode){
    if(mode === 'light'){ body.classList.add('light'); } else { body.classList.remove('light'); }
    try{ localStorage.setItem('kc-theme', mode); }catch(e){}
  }
  themeSwitch.addEventListener('click', ()=> setMode(body.classList.contains('light') ? 'dark' : 'light'));
  let saved = 'dark';
  try{ saved = localStorage.getItem('kc-theme') || 'dark'; }catch(e){}
  setMode(saved);
})();

/* ================= Resume data + admin system ================= */
(function(){
  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'Kaushal@2026';
  const SESSION_KEY = 'kc_portfolio_admin_session'; // shared with main site
  const PDF_KEY = 'kc_resume_pdf_v1';
  const PREVIEW_KEY = 'kc_resume_preview_v1';

  const previewImg = document.getElementById('resumePreviewImg');
  const downloadBtn = document.getElementById('downloadResumeBtn');
  const lastUpdatedText = document.getElementById('lastUpdatedText');

  const loginOverlay = document.getElementById('loginOverlay');
  const loginBtn = document.getElementById('adminLoginBtn');
  const loginClose = document.getElementById('loginClose');
  const loginSubmit = document.getElementById('loginSubmit');
  const loginUser = document.getElementById('loginUser');
  const loginPass = document.getElementById('loginPass');
  const loginError = document.getElementById('loginError');
  const adminBar = document.getElementById('adminBar');
  const adminBarTrigger = document.getElementById('adminBarTrigger');
  const logoutBtn = document.getElementById('logoutBtn');

  // const uploadPdfBtn = document.getElementById('uploadPdfBtn');

  const uploadBtn = document.getElementById("uploadPdfBtn");
const pdfInput = document.getElementById("pdf-upload");

uploadBtn.addEventListener("click", () => {
    pdfInput.click();
});

  const uploadPreviewBtn = document.getElementById('uploadPreviewBtn');
  const resetResumeBtn = document.getElementById('resetResumeBtn');
  const pdfFileInput = document.getElementById('pdfFileInput');
  const previewFileInput = document.getElementById('previewFileInput');

  function loadPdf(){
    try{
      const raw = localStorage.getItem(PDF_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return { dataUrl: DEFAULT_RESUME_PDF, filename: 'Kaushal_Chandola_Resume.pdf', updatedAt: DEFAULT_UPDATED_AT };
  }
  function savePdf(dataUrl, filename){
    const record = { dataUrl, filename: filename || 'Kaushal_Chandola_Resume.pdf', updatedAt: new Date().toISOString().slice(0,10) };
    try{ localStorage.setItem(PDF_KEY, JSON.stringify(record)); }
    catch(e){ alert('Could not save PDF — it may be too large for browser storage.'); }
    return record;
  }
  function loadPreview(){
    try{
      const raw = localStorage.getItem(PREVIEW_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return { dataUrl: DEFAULT_RESUME_PREVIEW, updatedAt: DEFAULT_UPDATED_AT };
  }
  function savePreview(dataUrl){
    const record = { dataUrl, updatedAt: new Date().toISOString().slice(0,10) };
    try{ localStorage.setItem(PREVIEW_KEY, JSON.stringify(record)); }
    catch(e){ alert('Could not save preview image — it may be too large for browser storage.'); }
    return record;
  }

  function render(){
    const pdf = loadPdf();
    const preview = loadPreview();
    previewImg.src = preview.dataUrl;
    downloadBtn.href = pdf.dataUrl;
    downloadBtn.download = pdf.filename || 'Kaushal_Chandola_Resume.pdf';
    const latest = (pdf.updatedAt > preview.updatedAt) ? pdf.updatedAt : preview.updatedAt;
    lastUpdatedText.textContent = 'Last updated: ' + latest;
  }
  render();

  function enterAdminMode(){
    adminBar.classList.add('show');
    loginBtn.style.display = 'none';
    try{ sessionStorage.setItem(SESSION_KEY, '1'); }catch(e){}
  }
  function exitAdminMode(){
    adminBar.classList.remove('show');
    loginBtn.style.display = '';
    try{ sessionStorage.removeItem(SESSION_KEY); }catch(e){}
  }
  try{ if(sessionStorage.getItem(SESSION_KEY) === '1'){ enterAdminMode(); } }catch(e){}

  if(adminBarTrigger){
    adminBarTrigger.addEventListener('click', (e)=>{ e.stopPropagation(); adminBar.classList.toggle('menu-open'); });
  }
  document.addEventListener('click', (e)=>{
    if(adminBar.classList.contains('menu-open') && !adminBar.contains(e.target)){ adminBar.classList.remove('menu-open'); }
  });

  loginBtn.addEventListener('click', ()=>{
    loginOverlay.classList.add('show');
    loginError.textContent = '';
    loginUser.value = ''; loginPass.value = '';
    setTimeout(()=> loginUser.focus(), 50);
  });
  loginClose.addEventListener('click', ()=> loginOverlay.classList.remove('show'));
  loginOverlay.addEventListener('click', (e)=>{ if(e.target === loginOverlay) loginOverlay.classList.remove('show'); });
  function attemptLogin(){
    if(loginUser.value === ADMIN_USER && loginPass.value === ADMIN_PASS){
      loginOverlay.classList.remove('show');
      enterAdminMode();
    } else {
      loginError.textContent = 'Incorrect username or password.';
    }
  }
  loginSubmit.addEventListener('click', attemptLogin);
  loginPass.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') attemptLogin(); });
  logoutBtn.addEventListener('click', ()=>{ exitAdminMode(); adminBar.classList.remove('menu-open'); });

  // uploadPdfBtn.addEventListener('click', ()=> pdfFileInput.click());



  pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

document.getElementById('pdf-upload').addEventListener('change', async function(e) {

    const file = e.target.files[0];
    const container = document.getElementById('resumePreviewWrap');
    container.innerHTML = "";

    if (!file || file.type !== "application/pdf") {
        alert("Select a PDF");
        return;
    }

    // Create Blob URL for download
    const fileURL = URL.createObjectURL(file);

    // Update download button
    downloadBtn.href = fileURL;
    downloadBtn.download = file.name;

    const arrayBuffer = await file.arrayBuffer();

    const pdf = await pdfjsLib.getDocument({
        data: arrayBuffer
    }).promise;

    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {

        const page = await pdf.getPage(pageNum);

        const viewport = page.getViewport({
            scale: 1.5
        });

        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
            canvasContext: context,
            viewport: viewport
        }).promise;

        canvas.style.width = "100%";
        canvas.style.marginBottom = "20px";

        container.appendChild(canvas);
    }
});

  });

  uploadPreviewBtn.addEventListener('click', ()=> previewFileInput.click());
  previewFileInput.addEventListener('click', e=> e.stopPropagation());
  previewFileInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (evt)=>{ savePreview(evt.target.result); render(); adminBar.classList.remove('menu-open'); };
    reader.readAsDataURL(file);
    previewFileInput.value = '';
  });

  resetResumeBtn.addEventListener('click', ()=>{
    if(!confirm('Reset resume to the original default file? This removes your uploaded PDF/image.')) return;
    try{ localStorage.removeItem(PDF_KEY); localStorage.removeItem(PREVIEW_KEY); }catch(e){}
    render();
    adminBar.classList.remove('menu-open');
  });
})();
</script>
</body>
</html>
